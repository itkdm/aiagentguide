<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6FBFF"/>
      <stop offset="1" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 42px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .subtitle { font: 400 22px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #475569; }
      .heroText { font: 700 28px "Microsoft YaHei", "PingFang SC", sans-serif; fill: white; }
      .heroSub { font: 400 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: rgba(255,255,255,0.92); }
      .colTitle { font: 700 24px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .chip { font: 600 17px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #0F172A; }
      .small { font: 500 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #334155; }
      .tiny { font: 500 14px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="32" fill="url(#bg)"/>

  <rect x="88" y="72" width="1424" height="180" rx="28" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="132" y="145" class="title" fill="white">RAG 教程目录</text>
  <text x="132" y="195" class="heroSub">从整体认知到生产落地，按层次组织 RAG 的学习路径</text>

  <rect x="132" y="122" width="320" height="92" rx="22" fill="rgba(255,255,255,0.14)"/>
  <text x="160" y="162" class="heroText">认知 → 数据 → 检索</text>
  <text x="160" y="193" class="heroSub">先建立系统视角，再进入实现细节</text>

  <rect x="488" y="122" width="320" height="92" rx="22" fill="rgba(255,255,255,0.14)"/>
  <text x="516" y="162" class="heroText">生成 → 评测 → 优化</text>
  <text x="516" y="193" class="heroSub">把链路拉通，再看效果归因与调优</text>

  <rect x="844" y="122" width="320" height="92" rx="22" fill="rgba(255,255,255,0.14)"/>
  <text x="872" y="162" class="heroText">工程 → 升级 → 原则</text>
  <text x="872" y="193" class="heroSub">最后进入上线、治理与高级形态</text>

  <rect x="1200" y="122" width="240" height="92" rx="22" fill="rgba(255,255,255,0.14)"/>
  <text x="1228" y="162" class="heroText">14 章结构</text>
  <text x="1228" y="193" class="heroSub">目录树按主题分层展开</text>

  <rect x="88" y="292" width="314" height="590" rx="28" fill="#FFFFFF" stroke="#D7E2EA" filter="url(#shadow)"/>
  <rect x="124" y="326" width="86" height="34" rx="17" fill="#E0F2FE"/>
  <text x="147" y="349" class="tiny">起步层</text>
  <text x="124" y="396" class="colTitle">认知层</text>
  <rect x="124" y="426" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="146" y="458" class="chip">第 1 章</text>
  <text x="146" y="486" class="small">RAG 全景图与核心认知</text>
  <rect x="124" y="526" width="242" height="46" rx="16" fill="#EFF6FF"/>
  <text x="146" y="555" class="small">1.1 定义与定位</text>
  <rect x="124" y="586" width="242" height="46" rx="16" fill="#ECFEFF"/>
  <text x="146" y="615" class="small">1.2 系统基本组成</text>
  <rect x="124" y="646" width="242" height="46" rx="16" fill="#F8FAFC"/>
  <text x="146" y="675" class="small">1.3 常见误解</text>
  <text x="124" y="748" class="subtitle">先回答什么是 RAG，边界在哪，</text>
  <text x="124" y="778" class="subtitle">避免后续把整条链路看偏。</text>

  <rect x="432" y="292" width="314" height="590" rx="28" fill="#FFFFFF" stroke="#D7E2EA" filter="url(#shadow)"/>
  <rect x="468" y="326" width="110" height="34" rx="17" fill="#DCFCE7"/>
  <text x="491" y="349" class="tiny">准备层</text>
  <text x="468" y="396" class="colTitle">数据与索引层</text>
  <rect x="468" y="426" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="490" y="458" class="chip">第 2 章</text>
  <text x="490" y="486" class="small">数据接入与知识库准备</text>
  <rect x="468" y="518" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="490" y="550" class="chip">第 3 章</text>
  <text x="490" y="578" class="small">Chunk、Metadata 与索引前设计</text>
  <rect x="468" y="610" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="490" y="642" class="chip">第 4 章</text>
  <text x="490" y="670" class="small">索引构建与知识库更新</text>
  <text x="468" y="748" class="subtitle">回答资料从哪里来，如何切块、</text>
  <text x="468" y="778" class="subtitle">组织 metadata，并维护索引。</text>

  <rect x="776" y="292" width="314" height="590" rx="28" fill="#FFFFFF" stroke="#D7E2EA" filter="url(#shadow)"/>
  <rect x="812" y="326" width="86" height="34" rx="17" fill="#FEF3C7"/>
  <text x="835" y="349" class="tiny">核心层</text>
  <text x="812" y="396" class="colTitle">检索层</text>
  <rect x="812" y="426" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="834" y="458" class="chip">第 5 章</text>
  <text x="834" y="486" class="small">Embedding、BM25 与混合检索</text>
  <rect x="812" y="518" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="834" y="550" class="chip">第 6 章</text>
  <text x="834" y="578" class="small">查询理解与检索链路设计</text>
  <rect x="812" y="610" width="242" height="74" rx="20" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="834" y="642" class="chip">第 7 章</text>
  <text x="834" y="670" class="small">重排、排序与结果精选</text>
  <text x="812" y="748" class="subtitle">决定能不能找到对的内容，</text>
  <text x="812" y="778" class="subtitle">以及把最有价值的结果送到生成端。</text>

  <rect x="1120" y="292" width="392" height="590" rx="28" fill="#FFFFFF" stroke="#D7E2EA" filter="url(#shadow)"/>
  <rect x="1156" y="326" width="110" height="34" rx="17" fill="#EDE9FE"/>
  <text x="1179" y="349" class="tiny">落地层</text>
  <text x="1156" y="396" class="colTitle">生成、评测与工程层</text>
  <rect x="1156" y="426" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="462" class="small">第 8 章 上下文构造与答案生成</text>
  <rect x="1156" y="496" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="532" class="small">第 9 章 RAG 评测体系与错误归因</text>
  <rect x="1156" y="566" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="602" class="small">第 10 章 RAG 调优方法论</text>
  <rect x="1156" y="636" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="672" class="small">第 11 章 生产级 RAG 工程实践</text>
  <rect x="1156" y="706" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="742" class="small">第 12 章 高级 RAG 形态与升级路径</text>
  <rect x="1156" y="776" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="812" class="small">第 13 章 从 0 到 1 搭一个最小可用 RAG</text>
  <rect x="1156" y="846" width="320" height="58" rx="18" fill="#F8FAFC" stroke="#D7E2EA"/>
  <text x="1178" y="882" class="small">第 14 章 常见误区与设计原则总结</text>
</svg>
