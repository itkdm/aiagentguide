name: Deploy VitePress Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check Pages state
        id: pages-check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo

            try {
              const response = await github.rest.repos.getPages({ owner, repo })
              const status = response.data.status || 'unknown'
              const url = response.data.html_url || ''

              core.notice(`GitHub Pages is enabled. Status: ${status}${url ? `, URL: ${url}` : ''}`)
              core.setOutput('enabled', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.warning(
                  'GitHub Pages is not initialized for this repository yet. Open Settings > Pages, keep Source set to "GitHub Actions", save, wait 1-2 minutes, then rerun this workflow.'
                )
                core.setOutput('enabled', 'false')
                return
              }

              throw error
            }

      - name: Configure Pages
        if: ${{ steps.pages-check.outputs.enabled == 'true' }}
        uses: actions/configure-pages@v5

      - name: Configure and enable Pages with PAT
        if: ${{ steps.pages-check.outputs.enabled != 'true' && secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}

      - name: Stop with setup instructions
        if: ${{ steps.pages-check.outputs.enabled != 'true' && secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        run: |
          echo "::error title=GitHub Pages is not initialized::Open Settings > Pages, set Source to 'GitHub Actions', save, wait 1-2 minutes, then rerun this workflow. If you want the workflow to auto-enable Pages, add a repository secret named PAGES_ENABLEMENT_TOKEN with a PAT that has repository admin access."
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
