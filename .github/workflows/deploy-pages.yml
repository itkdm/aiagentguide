name: Deploy VitePress Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_BASE: /
      DOCS_SITE_URL: https://aiagentguide.cn/

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check Pages state
        id: pages-check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo

            try {
              const response = await github.rest.repos.getPages({ owner, repo })
              const status = response.data.status || 'unknown'
              const url = response.data.html_url || ''

              core.notice(`GitHub Pages is enabled. Status: ${status}${url ? `, URL: ${url}` : ''}`)
              core.setOutput('enabled', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.warning(
                  'GitHub Pages is not initialized for this repository yet. Open Settings > Pages, keep Source set to "GitHub Actions", save, wait 1-2 minutes, then rerun this workflow.'
                )
                core.setOutput('enabled', 'false')
                return
              }

              throw error
            }

      - name: Configure Pages
        if: ${{ steps.pages-check.outputs.enabled == 'true' }}
        uses: actions/configure-pages@v5

      - name: Stop with setup instructions
        if: ${{ steps.pages-check.outputs.enabled != 'true' }}
        run: |
          echo "::error title=GitHub Pages is not initialized::Open Settings > Pages, set Source to 'GitHub Actions', save, wait 1-2 minutes, then rerun this workflow."
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        timeout-minutes: 5
        run: |
          rm -rf docs/.vitepress/.temp docs/.vitepress/dist
          node ./scripts/build-pages.mjs

      - name: Verify build output
        run: |
          test -f docs/.vitepress/dist/index.html
          test -f docs/.vitepress/dist/robots.txt
          test -f docs/.vitepress/dist/sitemap.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      INDEXNOW_KEY: 91444b8270a94408a74c1a2538765240
      INDEXNOW_SITE_URL: https://aiagentguide.cn/
      INDEXNOW_KEY_LOCATION: https://aiagentguide.cn/91444b8270a94408a74c1a2538765240.txt

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout repository
        if: ${{ github.event_name == 'push' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Collect changed documentation files
        if: ${{ github.event_name == 'push' }}
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const before = context.payload.before

            if (!before || /^0+$/.test(before)) {
              core.notice('Skipping IndexNow submission because no previous commit SHA is available.')
              core.setOutput('files', '')
              return
            }

            const { owner, repo } = context.repo
            const basehead = `${before}...${context.sha}`
            const response = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead
            })

            const files = (response.data.files || [])
              .map((file) => file.filename)
              .filter((file) => file.startsWith('docs/'))

            if (!files.length) {
              core.notice('No documentation changes detected for IndexNow submission.')
              core.setOutput('files', '')
              return
            }

            core.notice(`Collected ${files.length} changed documentation file(s) for IndexNow submission.`)
            core.setOutput('files', files.join('\n'))

      - name: Submit changed URLs to IndexNow
        if: ${{ github.event_name == 'push' && steps.changed-files.outputs.files != '' }}
        env:
          INDEXNOW_FILE_PATHS: ${{ steps.changed-files.outputs.files }}
        run: node ./scripts/indexnow-submit.mjs
